<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Department Admin - Students</title>
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <div class="brand">AttendIQ</div>
        <nav class="sidebar-nav">
          <a href="../dept_admin/dashboard.html">Dashboard</a>
          <a href="students.html" class="active">Students</a>
          <a href="../dept_admin/faculty.html">Faculty</a>
          <a href="../super_admin/departments.html">Departments</a>
        </nav>
      </aside>

      <main class="main-content">
        <header class="page-header">
          <div>
            <h1>Student Management</h1>
            <p>Manage students in your department, including enrollment status and assignments.</p>
          </div>
          <button id="logoutButton" class="btn btn-secondary">Logout</button>
        </header>

        <section class="panel">
          <div class="panel-heading">
            <h2>Search and Filter</h2>
          </div>
          <div class="panel-body grid gap-sm">
            <div class="form-group">
              <label for="searchInput">Search students</label>
              <input id="searchInput" type="search" placeholder="Name, email, roll number" />
            </div>
            <div class="form-group">
              <label for="filterDepartment">Department</label>
              <select id="filterDepartment">
                <option value="">All departments</option>
              </select>
            </div>
            <div class="form-group align-end">
              <button id="searchButton" class="btn btn-primary">Apply</button>
              <button id="clearButton" class="btn btn-secondary">Clear</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>Student List</h2>
          </div>
          <div class="panel-body">
            <table class="table" aria-label="Student list">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Roll number</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Department</th>
                  <th>Face</th>
                  <th>Voice</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="studentsTableBody"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2 id="formTitle">Add new student</h2>
          </div>
          <div class="panel-body">
            <form id="studentsForm" class="form-grid">
              <div class="form-group">
                <label for="fullNameInput">Full name</label>
                <input id="fullNameInput" type="text" required />
              </div>
              <div class="form-group">
                <label for="rollNumberInput">Roll number</label>
                <input id="rollNumberInput" type="text" required />
              </div>
              <div class="form-group">
                <label for="emailInput">Email</label>
                <input id="emailInput" type="email" required />
              </div>
              <div class="form-group">
                <label for="phoneInput">Phone</label>
                <input id="phoneInput" type="tel" />
              </div>
              <div class="form-group">
                <label for="departmentSelect">Department</label>
                <select id="departmentSelect" required>
                  <option value="">Select department</option>
                </select>
              </div>
              <div class="form-group checkbox-group">
                <label>
                  <input id="faceEnrolledInput" type="checkbox" /> Face enrolled
                </label>
              </div>
              <div class="form-group checkbox-group">
                <label>
                  <input id="voiceEnrolledInput" type="checkbox" /> Voice enrolled
                </label>
              </div>
              <div class="form-actions full-width">
                <button type="submit" class="btn btn-primary">Save student</button>
                <button id="resetButton" type="button" class="btn btn-secondary">Reset</button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/dashboard.js"></script>
    <script src="../assets/js/students.js"></script>
  </body>
</html>

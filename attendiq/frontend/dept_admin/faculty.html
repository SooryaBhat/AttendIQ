<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Department Admin - Faculty</title>
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <div class="brand">AttendIQ</div>
        <nav class="sidebar-nav">
          <a href="../dept_admin/dashboard.html">Dashboard</a>
          <a href="../dept_admin/students.html">Students</a>
          <a href="faculty.html" class="active">Faculty</a>
          <a href="../super_admin/departments.html">Departments</a>
        </nav>
      </aside>

      <main class="main-content">
        <header class="page-header">
          <div>
            <h1>Faculty Management</h1>
            <p>Manage faculty profiles and assignments for your department.</p>
          </div>
          <a href="#logout" class="btn btn-secondary">Logout</a>
        </header>

        <section class="panel">
          <div class="panel-heading">
            <h2>Search and Filter</h2>
          </div>
          <div class="panel-body grid gap-sm">
            <div class="form-group">
              <label for="facultySearchInput">Search faculty</label>
              <input id="facultySearchInput" type="search" placeholder="Name or email" />
            </div>
            <div class="form-group">
              <label for="facultyFilterDepartment">Department</label>
              <select id="facultyFilterDepartment">
                <option value="">All departments</option>
              </select>
            </div>
            <div class="form-group align-end">
              <button id="facultySearchButton" class="btn btn-primary">Apply</button>
              <button id="facultyClearButton" class="btn btn-secondary">Clear</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>Faculty List</h2>
          </div>
          <div class="panel-body">
            <table class="table" aria-label="Faculty list">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Department</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="facultyTableBody"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2 id="facultyFormTitle">Add new faculty</h2>
          </div>
          <div class="panel-body">
            <form id="facultyForm" class="form-grid">
              <div class="form-group">
                <label for="facultyNameInput">Full name</label>
                <input id="facultyNameInput" type="text" required />
              </div>
              <div class="form-group">
                <label for="facultyEmailInput">Email</label>
                <input id="facultyEmailInput" type="email" required />
              </div>
              <div class="form-group">
                <label for="facultyPhoneInput">Phone</label>
                <input id="facultyPhoneInput" type="tel" />
              </div>
              <div class="form-group">
                <label for="facultyDepartmentSelect">Department</label>
                <select id="facultyDepartmentSelect" required>
                  <option value="">Select department</option>
                </select>
              </div>
              <div class="form-group">
                <label for="facultyPasswordInput">Password</label>
                <input id="facultyPasswordInput" type="password" placeholder="Leave blank to use default" />
              </div>
              <div class="form-group checkbox-group">
                <label>
                  <input id="facultyActiveInput" type="checkbox" checked /> Active
                </label>
              </div>
              <div class="form-actions full-width">
                <button type="submit" class="btn btn-primary">Save faculty</button>
                <button id="facultyResetButton" type="button" class="btn btn-secondary">Reset</button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/dashboard.js"></script>
    <script src="../assets/js/faculty.js"></script>
  </body>
</html>
